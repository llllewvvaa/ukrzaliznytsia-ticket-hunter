<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 340" width="1280" height="340" role="img" aria-label="UZ Ticket Hunter">
  <defs>
    <linearGradient id="logo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eff6ff"/>
      <stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
    <clipPath id="cardClip"><rect x="940" y="60" width="252" height="220" rx="22"/></clipPath>
    <style>
      .t{font-family:'Segoe UI',system-ui,-apple-system,Roboto,Arial,sans-serif}
    </style>
  </defs>

  <rect width="1280" height="340" fill="#ffffff"/>
  <circle cx="1130" cy="30" r="190" fill="#dbeafe" opacity="0.45"/>
  <circle cx="120" cy="330" r="150" fill="#e0e7ff" opacity="0.4"/>

  <!-- logo: converging rail tracks -->
  <g transform="translate(96,52) scale(0.5)">
    <rect width="128" height="128" rx="28" fill="#0B1020"/>
    <polygon points="40,110 52,110 60,26 56,26" fill="#fff"/>
    <polygon points="88,110 76,110 68,26 72,26" fill="#fff"/>
    <rect x="30" y="98" width="68" height="10" rx="5" fill="#fff"/>
    <rect x="40" y="66" width="48" height="9" rx="4" fill="#fff"/>
    <rect x="48" y="38" width="32" height="8" rx="4" fill="#fff"/>
  </g>

  <text class="t" x="180" y="104" font-size="52" font-weight="800" fill="#0f172a" letter-spacing="-1">UZ Ticket Hunter</text>

  <text class="t" x="98" y="166" font-size="24" font-weight="500" fill="#475569">Chrome-розширення: стежить за <tspan font-weight="700" fill="#1e293b">booking.uz</tspan> і бронює місце,</text>
  <text class="t" x="98" y="198" font-size="24" font-weight="500" fill="#475569">щойно воно звільниться. Оплата — вручну.</text>

  <!-- feature pills -->
  <g class="t" font-size="14" font-weight="600" fill="#1d4ed8">
    <rect x="98" y="232" width="168" height="34" rx="17" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="182" y="254" text-anchor="middle">Моніторинг 24/7</text>
    <rect x="278" y="232" width="156" height="34" rx="17" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="356" y="254" text-anchor="middle">Автобронювання</text>
    <rect x="446" y="232" width="150" height="34" rx="17" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="521" y="254" text-anchor="middle">Пресейл-снайп</text>
    <rect x="608" y="232" width="140" height="34" rx="17" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="678" y="254" text-anchor="middle">Оплата вручну</text>
  </g>

  <!-- boarding-pass card -->
  <rect x="940" y="60" width="252" height="220" rx="22" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <g clip-path="url(#cardClip)">
    <rect x="940" y="60" width="252" height="122" fill="url(#card)"/>
  </g>
  <g class="t">
    <rect x="960" y="82" width="58" height="23" rx="11.5" fill="#ffffff" stroke="#dbeafe"/>
    <text x="989" y="98" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8">043Л</text>
    <text x="1172" y="100" text-anchor="end" font-size="14" font-weight="700" fill="#1e293b">1 240 ₴</text>

    <text x="960" y="150" font-size="26" font-weight="800" fill="#0f172a">08:15</text>
    <text x="960" y="169" font-size="11" font-weight="500" fill="#64748b">Київ</text>
    <text x="1066" y="146" text-anchor="middle" font-size="20" fill="#93c5fd">→</text>
    <text x="1172" y="150" text-anchor="end" font-size="26" font-weight="800" fill="#0f172a">14:30</text>
    <text x="1172" y="169" text-anchor="end" font-size="11" font-weight="500" fill="#64748b">Львів</text>

    <line x1="958" y1="206" x2="1174" y2="206" stroke="#e2e8f0" stroke-width="1.5" stroke-dasharray="5 5"/>

    <text x="960" y="248" font-size="13" font-weight="600" fill="#334155">Купе · місце 21</text>
    <rect x="1078" y="232" width="96" height="26" rx="13" fill="#ecfdf5"/>
    <text x="1126" y="249" text-anchor="middle" font-size="11" font-weight="700" fill="#047857">Заброньовано</text>
  </g>
</svg>
