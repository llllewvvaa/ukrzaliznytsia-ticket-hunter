name: Зміна ендпоінта / API
description: Ендпоінт booking.uz / app.uz змінився, зламався або потребує дослідження — додайте дебаг-запис.
title: '[endpoint] '
labels: [endpoint]
body:
  - type: markdown
    attributes:
      value: |
        Дякуємо, що допомагаєте тримати API-шар робочим. Для проблем з ендпоінтами нам потрібен **дебаг-запис**, щоб порівняти форми запитів і відповідей.

        Експорт **автоматично очищається** — Bearer/JWT токени, `x-session-id`, ваш user id, імена, email, телефон, документи та дані картки видаляються або замінюються стабільним хешем ще до запису файла. Проте перегляньте файл перед тим, як прикріплювати.
  - type: textarea
    id: summary
    attributes:
      label: Що змінилося / що зламалося
      description: Який сценарій (пошук станцій, моніторинг, резерв, «Мої квитки»…) і що ви побачили — помилку, порожній результат чи неправильні дані.
    validations:
      required: true
  - type: input
    id: endpoint
    attributes:
      label: Ендпоінт (якщо відомий)
      placeholder: напр. GET /api/v4/orders-with-routes
    validations:
      required: false
  - type: textarea
    id: debug
    attributes:
      label: Дебаг-запис
      description: |
        1. Відкрийте сторінку **«Налаштування»** розширення → розділ **«Дебаг»** → увімкніть **«Запис усіх запитів і подій»**.
        2. Відтворіть проблему у вкладці booking.uz.
        3. Натисніть **«Експортувати JSON»** і перетягніть файл `uz-debug-*.json` у поле нижче.
      placeholder: Перетягніть uz-debug-*.json сюди (або вставте відповідні події).
    validations:
      required: true
  - type: checkboxes
    id: confirm
    attributes:
      label: Перед надсиланням
      options:
        - label: Я прикріпив(-ла) експортований дебаг-JSON (він автоматично очищений).
          required: true
        - label: Я переглянув(-ла) файл — у ньому немає персональних даних, які я не хочу публікувати.
          required: true
