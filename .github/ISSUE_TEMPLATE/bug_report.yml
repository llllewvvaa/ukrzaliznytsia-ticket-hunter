name: Звіт про помилку
description: Щось не працює (не пов'язано зі зміною API/ендпоінта).
title: '[bug] '
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: Що сталося
      description: Що ви робили, чого очікували і що сталося натомість. Скриншоти дуже допомагають.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Версія розширення
      placeholder: напр. 0.1.0 (див. chrome://extensions)
    validations:
      required: false
  - type: input
    id: env
    attributes:
      label: Браузер / ОС
      placeholder: напр. Chrome 126 на macOS 14
    validations:
      required: false
  - type: markdown
    attributes:
      value: |
        Якщо проблема стосується запитів до booking.uz, дуже допомагає **дебаг-запис** — як його зробити, описано в шаблоні **«Зміна ендпоінта / API»**. Експорт автоматично очищається (токени, session id, імена, email, дані картки видаляються).
